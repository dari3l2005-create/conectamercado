{% extends 'locatarios/base.html' %}
{% block title %}Recuperar contraseña{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Recuperar contraseña</h2>
        <p style="text-align:center;font-size:0.85rem;color:#777;margin-bottom:1.1rem;">
            Verifica tu identidad con el correo y teléfono de tu cuenta y crea una nueva contraseña.
        </p>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Correo electrónico</label>
                <input type="email" name="correo" required placeholder="correo@ejemplo.com">
            </div>

            <div class="form-group">
                <label>Teléfono registrado</label>
                <input type="text" name="telefono" required placeholder="Ej. 5512345678">
            </div>

            <div class="form-group">
                <label>Nueva contraseña</label>
                <input type="password" name="nueva_contrasena" required placeholder="Mínimo 6 caracteres">
            </div>

            <div class="form-group">
                <label>Confirmar nueva contraseña</label>
                <input type="password" name="confirmar_contrasena" required placeholder="Repite la contraseña">
            </div>

            <button type="submit" class="btn btn-green">Actualizar contraseña</button>
        </form>

        <div class="auth-footer">
            <a href="/locatarios/login/">Volver a iniciar sesión</a>
        </div>
    </div>
</div>
{% endblock %}
